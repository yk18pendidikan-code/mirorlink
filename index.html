<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Manual Control Center</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main-red: #d90429; --bg: #ffffff; --text: #2b2d42; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        
        .container { max-width: 500px; margin: auto; }
        .box { border: 2px solid var(--main-red); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .btn-red { background: var(--main-red); color: white; }
        .btn-white { background: white; border: 2px solid var(--main-red); color: var(--main-red); }
        
        #videoArea { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 100; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .close-btn { position: absolute; top: 20px; right: 20px; z-index: 101; background: var(--main-red); color: white; border: none; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--main-red)">Manual Control Center</h2>
    
    <!-- Input ID Manual -->
    <label>ID Kamar (Tentukan Sendiri):</label>
    <input type="text" id="manualId" placeholder="Contoh: RUANG123">

    <!-- Mode Receiver (TV) -->
    <div class="box">
        <h3 style="margin-top:0">1. Mode Penerima (TV)</h3>
        <button class="btn-white" onclick="startReceiver()">Jadikan Perangkat Ini PENERIMA</button>
    </div>

    <!-- Mode Pengirim -->
    <div class="box">
        <h3 style="margin-top:0">2. Mode Pengirim (Sender)</h3>
        <button class="btn-red" onclick="startSender('camera')">Kirim KAMERA</button>
        <button class="btn-red" onclick="startSender('screen')">Kirim LAYAR</button>
    </div>

    <!-- Mode Video Call -->
    <div class="box">
        <h3 style="margin-top:0">3. Video Call (2 Arah)</h3>
        <button class="btn-red" style="background:#2b2d42" onclick="startCall()">Mulai Video Call</button>
    </div>
    
    <div id="status" style="text-align:center; color:var(--main-red); font-weight:bold;">Status: Standby</div>
</div>

<div id="videoArea">
    <button class="close-btn" onclick="location.reload()">Putuskan Koneksi</button>
    <video id="view" autoplay playsinline></video>
</div>

<script>
    let peer, localStream, currentCall;

    function status(msg) { document.getElementById('status').innerText = "Status: " + msg; }

    // --- MODE 1: PENERIMA (TV) ---
    function startReceiver() {
        const id = document.getElementById('manualId').value;
        if(!id) return alert("Isi ID Dulu!");
        
        peer = new Peer(id);
        status("Menunggu panggilan di ID: " + id);
        
        peer.on('call', call => {
            call.answer();
            document.getElementById('videoArea').style.display = 'block';
            call.on('stream', s => document.getElementById('view').srcObject = s);
            status("Menerima Sinyal...");
        });
    }

    // --- MODE 2: PENGIRIM (1-ARAH) ---
    async function startSender(type) {
        const id = document.getElementById('manualId').value;
        if(!id) return alert("Isi ID Tujuan!");

        try {
            if(type === 'camera') localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            else localStream = await navigator.mediaDevices.getDisplayMedia({video:true});
            
            peer = new Peer();
            peer.on('open', () => {
                currentCall = peer.call(id, localStream);
                status("Mengirim ke " + id);
                document.getElementById('videoArea').style.display = 'block';
                document.getElementById('view').srcObject = localStream;
            });
        } catch(e) { status("Gagal akses: " + e.message); }
    }

    // --- MODE 3: VIDEO CALL (2-ARAH) ---
    async function startCall() {
        const id = document.getElementById('manualId').value;
        if(!id) return alert("Isi ID!");

        localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById('videoArea').style.display = 'block';
        document.getElementById('view').srcObject = localStream;

        peer = new Peer(id + "-HOST"); // Tambah suffix hanya internal
        
        // Panggil pihak lain
        currentCall = peer.call(id + "-GUEST", localStream);
        currentCall.on('stream', s => document.getElementById('view').srcObject = s);

        // Jika ada yang nelpon balik
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => document.getElementById('view').srcObject = s);
        });
    }
</script>
</body>
</html>
