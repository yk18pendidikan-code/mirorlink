<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Video Call & Mirror Workspace</title>
    <!-- PeerJS untuk koneksi P2P WebRTC langsung antar perangkat -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }

        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.8rem; color: #fff; }
        header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
        }

        @media (min-width: 768px) {
            .workspace { grid-template-columns: 320px 1fr; }
        }

        /* Panel Kontrol Jaringan & Media */
        .control-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            height: fit-content;
        }

        .section-title { font-size: 0.9rem; font-weight: 700; uppercase; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.5px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 6px; color: var(--text-muted); }
        .room-input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 1.1rem; text-align: center; font-weight: bold; }
        .room-input:focus { border-color: var(--accent); outline: none; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.2s; color: #fff; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        .media-toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .toggle-btn { padding: 10px; background: #334155; border: 1px solid #475569; border-radius: 6px; color: #fff; font-size: 0.8rem; cursor: pointer; }
        .toggle-btn.active { background: rgba(59, 130, 246, 0.2); border-color: var(--accent); color: #60a5fa; }

        .status-box { padding: 10px; background: #0f172a; border-radius: 6px; font-size: 0.8rem; text-align: center; color: #38bdf8; border: 1px solid #1e293b; line-height: 1.4; }

        /* Grid Video Call Display */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            background: #090d16;
            border-radius: 16px;
            padding: 15px;
            min-height: 400px;
            border: 1px solid #1e293b;
        }

        @media (min-width: 600px) {
            .video-grid { grid-template-columns: 1fr 1fr; }
        }

        .video-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; border: 1px solid #334155; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(15, 23, 42, 0.75); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<header>
    <h1>WebRTC P2P Video Link</h1>
    <p>Dua Arah: Video Call, Kamera Flip, Mikrofon, & Share Screen</p>
</header>

<div class="workspace">
    <!-- PANEL KONTROL -->
    <div class="control-panel">
        <div class="section-title">1. Pengaturan Kamar</div>
        <div class="input-group">
            <label for="roomId">Buat / Masukkan ID Kamar Bebas:</label>
            <input type="text" id="roomId" class="room-input" placeholder="contoh: kamar-ku">
        </div>
        
        <button class="btn btn-success" onclick="startRoom()">🟢 Buka / Masuk Kamar</button>
        <button class="btn btn-danger" id="btnLeave" style="display:none;" onclick="leaveRoom()">🛑 Tinggalkan Kamar</button>

        <div class="section-title" style="margin-top: 20px;">2. Media Anda (HP / PC)</div>
        <div class="media-toggles">
            <button id="micBtn" class="toggle-btn active" onclick="toggleMic()">🎙️ Mic: ON</button>
            <button id="camBtn" class="toggle-btn active" onclick="toggleCam()">📷 Cam: ON</button>
        </div>
        <button id="flipBtn" class="btn btn-primary" onclick="flipCamera()">🔄 Alihkan Kamera (Belakang)</button>
        <button id="shareBtn" class="btn btn-primary" style="background: #64748b;" onclick="toggleScreenShare()">💻 Bagikan Layar</button>

        <div class="section-title" style="margin-top: 20px;">Jalur Jaringan</div>
        <div id="statusTxt" class="status-box">Status: Offline. Silakan tentukan ID Kamar.</div>
    </div>

    <!-- AREA VIDEO CALL -->
    <div class="video-grid">
        <!-- Kamera Lokal (Diri Sendiri) -->
        <div class="video-wrapper">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="video-label">Anda (Lokal)</div>
        </div>
        <!-- Kamera Remote (Lawan Bicara / HP di TV) -->
        <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="video-label">Koneksi Seberang (Remote)</div>
        </div>
    </div>
</div>

<script>
    let peer = null;
    let localStream = null;
    let currentCall = null;
    
    // State default kontrol media
    let isMicOn = true;
    let isCamOn = true;
    let currentFacingMode = "user"; // "user" = depan, "environment" = belakang
    let isSharingScreen = false;

    const PREFIX = "vcall-room-id-";

    function logStatus(msg) { document.getElementById('statusTxt').innerText = "Status: " + msg; }

    // Ambil Akses Kamera dan Mikrofon secara Real-time
    async function getMedia(constraints) {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        try {
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('localVideo').srcObject = localStream;
            return true;
        } catch (err) {
            console.error(err);
            alert("Gagal mengakses media: " + err.message);
            return false;
        }
    }

    // ================= EKSEKUSI UTAMA: MASUK KAMAR (VIDEO CALL) =================
    async function startRoom() {
        const roomId = document.getElementById('roomId').value.trim();
        if(!roomId) return alert("Masukkan ID Kamar terlebih dahulu!");

        logStatus("Menyiapkan kamera & mikrofon...");
        const mediaReady = await getMedia({
            audio: isMicOn,
            video: { facingMode: currentFacingMode, width: 640, height: 480 }
        });

        if(!mediaReady) return;

        logStatus("Menghubungkan ke server Peer Cloud...");
        
        // Kita gunakan ID Kamar terikat agar salah satu bertindak sebagai 'Host' atau 'Guest' secara otomatis
        peer = new Peer(PREFIX + roomId, {
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
            logStatus("Kamar aktif! Bagikan ID '" + roomId + "' ke perangkat lain.");
            document.getElementById('btnLeave').style.display = "block";
        });

        // SKENARIO 1: Menangani panggilan masuk (Jika perangkat ini adalah yang stand-by pertama kali / TV / PC)
        peer.on('call', (call) => {
            logStatus("Menerima panggilan masuk...");
            currentCall = call;
            call.answer(localStream); // Kirim balik stream video lokal kita sendiri (Dua Arah)
            
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
                logStatus("Terkoneksi! Video Call berjalan dua arah.");
            });
        });

        // SKENARIO 2: Jika ID sudah diambil, berarti perangkat kedua masuk. Kita panggil perangkat pertama.
        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                logStatus("Kamar sudah terisi, mencoba menyambung sebagai peserta kedua...");
                
                // Buat peer dengan ID acak untuk menelepon kamar yang sudah stand-by
                peer = new Peer({
                    config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
                });

                peer.on('open', () => {
                    currentCall = peer.call(PREFIX + roomId, localStream);
                    logStatus("Menghubungkan sinyal...");
                    
                    currentCall.on('stream', (remoteStream) => {
                        document.getElementById('remoteVideo').srcObject = remoteStream;
                        logStatus("Terkoneksi! Hubungan dua arah berhasil.");
                    });
                });
            } else {
                logStatus("Error: " + err.message);
            }
        });
    }

    // ================= FITUR MENGALIHKAN KAMAR DEPAN / BELAKANG =================
    async function flipCamera() {
        if(isSharingScreen) return alert("Matikan share screen terlebih dahulu sebelum memutar kamera!");
        
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        document.getElementById('flipBtn').innerText = currentFacingMode === "user" ? "🔄 Alihkan Kamera (Belakang)" : "🔄 Alihkan Kamera (Depan)";
        
        if (localStream) {
            logStatus("Mengalihkan lensa kamera...");
            await getMedia({
                audio: isMicOn,
                video: { facingMode: currentFacingMode, width: 640, height: 480 }
            });

            // Jika sedang dalam panggilan aktif, perbarui track video ke lawan bicara secara langsung
            if (currentCall && currentCall.peerConnection) {
                const videoTrack = localStream.getVideoTracks()[0];
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
            }
            logStatus("Kamera dialihkan.");
        }
    }

    // ================= FITUR BAGIKAN LAYAR (SHARE SCREEN) =================
    async function toggleScreenShare() {
        if(!isSharingScreen) {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                isSharingScreen = true;
                document.getElementById('shareBtn').innerText = "🛑 Hentikan Share Screen";
                
                // Ganti track video lokal
                const videoTrack = screenStream.getVideoTracks()[0];
                document.getElementById('localVideo').srcObject = screenStream;

                if (currentCall && currentCall.peerConnection) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                }

                videoTrack.onended = () => { toggleScreenShare(); }; // auto balik ke kamera jika share di-stop lewat sistem OS
            } catch (err) {
                console.error(err);
            }
        } else {
            isSharingScreen = false;
            document.getElementById('shareBtn').innerText = "💻 Bagikan Layar";
            // Kembalikan ke kamera normal
            await getMedia({ audio: isMicOn, video: { facingMode: currentFacingMode } });
            if (currentCall && currentCall.peerConnection) {
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(localStream.getVideoTracks()[0]);
            }
        }
    }

    // ================= KONTROL AUDIO & VIDEO MUTE =================
    function toggleMic() {
        isMicOn = !isMicOn;
        if(localStream) {
            localStream.getAudioTracks()[0].enabled = isMicOn;
            document.getElementById('micBtn').classList.toggle('active', isMicOn);
            document.getElementById('micBtn').innerText = isMicOn ? "🎙️ Mic: ON" : "🎙️ Mic: OFF";
        }
    }

    function toggleCam() {
        isCamOn = !isCamOn;
        if(localStream) {
            localStream.getVideoTracks()[0].enabled = isCamOn;
            document.getElementById('camBtn').classList.toggle('active', isCamOn);
            document.getElementById('camBtn').innerText = isCamOn ? "📷 Cam: ON" : "📷 Cam: OFF";
        }
    }

    // ================= RESET DAN KELUAR JARINGAN =================
    function leaveRoom() {
        if(currentCall) currentCall.close();
        if(peer) peer.destroy();
        if(localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('btnLeave').style.display = "none";
        logStatus("Offline. Telah keluar dari kamar.");
    }
</script>

</body>
</html>
