<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Anycast & WA Video Call</title>
    <!-- PeerJS untuk koneksi P2P WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #111b21; color: #fff; height: 100vh; overflow: hidden; }

        /* ==================== MENU UTAMA (LOBBY) ==================== */
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; background: #0b141a; }
        .card { background: #202c33; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.5rem; margin-bottom: 20px; font-weight: 500; }
        input { width: 100%; padding: 15px; background: #2a3942; border: none; border-radius: 10px; color: #d1d7db; font-size: 1.2rem; text-align: center; margin-bottom: 20px; outline: none; }
        input:focus { background: #3b4a54; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { border: none; padding: 15px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; color: #fff; }
        .btn-green { background: #00a884; }
        .btn-green:hover { background: #029072; }
        .btn-blue { background: #005c4b; }
        .btn-blue:hover { background: #014d3f; }
        .btn-tv { background: #3b4a54; }
        
        .status-text { margin-top: 15px; font-size: 0.85rem; color: #8696a0; }

        /* ==================== MODE ANYCAST TV (PENERIMA FULLSCREEN) ==================== */
        #tvMode { display: none; width: 100vw; height: 100vh; background: #000; position: relative; }
        .tv-standby { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }
        .tv-standby h2 { font-size: 3rem; color: #00a884; letter-spacing: 5px; margin-bottom: 10px; }
        .tv-standby p { color: #8696a0; font-size: 1.2rem; }

        /* ==================== MODE WA VIDEO CALL (UI) ==================== */
        #callScreen { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        
        /* Video Lawan Bicara (Full Screen Background) */
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Video Kita Sendiri (Kotak Kecil di Kanan Bawah - PIP) */
        .pip-container { 
            position: absolute; bottom: 120px; right: 20px; width: 110px; height: 160px; 
            border-radius: 12px; overflow: hidden; border: 2px solid #3b4a54; 
            z-index: 10; background: #202c33; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s;
        }
        #localVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* Efek Cermin */ }

        /* Header WA */
        .call-header {
            position: absolute; top: 0; left: 0; width: 100%; padding: 40px 20px 20px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 10; display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .call-header span { font-size: 0.9rem; color: #e9edef; font-weight: 500; margin-bottom: 5px; display: flex; align-items: center; gap: 5px;}
        .call-header .encryption { font-size: 0.75rem; color: #8696a0; }

        /* Tombol Kontrol Bawah (WA Style) */
        .call-controls {
            position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10;
        }
        .ctrl-btn {
            width: 55px; height: 55px; border-radius: 50%; background: rgba(32, 44, 51, 0.8); border: none; backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: #fff;
        }
        .ctrl-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .ctrl-btn.off { background: #f15c6d; color: #fff; } /* Warna merah saat dimatikan */
        .ctrl-btn.end-call { background: #f15c6d; width: 65px; height: 65px; }
        .ctrl-btn.end-call svg { transform: rotate(135deg); width: 28px; height: 28px;}
    </style>
</head>
<body>

    <!-- ==================== LOBBY UTAMA ==================== -->
    <div id="lobby">
        <div class="card">
            <h1>Kode Koneksi</h1>
            <input type="text" id="roomPin" placeholder="Masukkan ID Kamar" value="Kamar-123">
            
            <div class="btn-group">
                <!-- Fitur 2-Arah -->
                <button class="btn-green" onclick="startWhatsAppCall()">📞 Gabung Video Call (WA Style)</button>
                
                <hr style="border: 0; border-top: 1px solid #2a3942; margin: 10px 0;">
                
                <!-- Fitur 1-Arah (Anycast Mode) -->
                <button class="btn-blue" onclick="startCastSender('screen')">💻 Kirim Layar HP ke TV (Cast)</button>
                <button class="btn-tv" onclick="startAnycastReceiver()">📺 Jadikan Perangkat Ini TV (Penerima)</button>
            </div>
            <p class="status-text" id="lobbyStatus">WebRTC P2P Ready</p>
        </div>
    </div>

    <!-- ==================== MODE ANYCAST TV (1-ARAH) ==================== -->
    <div id="tvMode">
        <div class="tv-standby" id="tvStandby">
            <h2 id="tvPinDisplay">---</h2>
            <p>Menunggu Transmisi Masuk...</p>
        </div>
        <video id="tvVideo" autoplay playsinline></video>
    </div>

    <!-- ==================== MODE VIDEO CALL WA (2-ARAH) ==================== -->
    <div id="callScreen">
        <div class="call-header">
            <span>🔒 Terenkripsi secara end-to-end</span>
            <div class="encryption" id="callStatus">Memanggil...</div>
        </div>

        <video id="remoteVideo" autoplay playsinline></video>
        
        <div class="pip-container" id="pipContainer">
            <video id="localVideo" autoplay playsinline muted></video>
        </div>

        <div class="call-controls">
            <!-- Balik Kamera -->
            <button class="ctrl-btn" onclick="flipCamera()">
                <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
            </button>
            <!-- Toggle Kamera -->
            <button class="ctrl-btn" id="btnCam" onclick="toggleCam()">
                <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            </button>
            <!-- Toggle Mic -->
            <button class="ctrl-btn" id="btnMic" onclick="toggleMic()">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
            <!-- Share Screen dalam VC -->
            <button class="ctrl-btn" onclick="shareScreenInCall()">
                <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
            </button>
            <!-- End Call -->
            <button class="ctrl-btn end-call" onclick="endCall()">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            </button>
        </div>
    </div>

<script>
    const PREFIX = "anycast-wa-";
    let peer, currentCall, localStream;
    let isMicOn = true, isCamOn = true;
    let facingMode = "user"; // Depan default

    // ================= FUNGSI 1: MODE PENERIMA TV / ANYCAST (1-ARAH) =================
    function startAnycastReceiver() {
        const pin = document.getElementById('roomPin').value.trim();
        if(!pin) return alert("Masukkan ID!");

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('tvMode').style.display = 'block';
        document.getElementById('tvPinDisplay').innerText = pin;

        peer = new Peer(PREFIX + pin);
        peer.on('call', (call) => {
            currentCall = call;
            call.answer(); // Jawab tanpa ngirim stream balik (karena ini TV)
            call.on('stream', (remoteStream) => {
                document.getElementById('tvStandby').style.display = 'none';
                const video = document.getElementById('tvVideo');
                video.srcObject = remoteStream;
                video.style.width = '100%'; video.style.height = '100%'; video.style.objectFit = 'contain';
            });
        });
    }

    // ================= FUNGSI 2: MODE PENGIRIM LAYAR KE TV (1-ARAH) =================
    async function startCastSender(type) {
        const pin = document.getElementById('roomPin').value.trim();
        if(!pin) return alert("Masukkan ID TV!");

        try {
            document.getElementById('lobbyStatus').innerText = "Meminta izin layar...";
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            
            peer = new Peer();
            peer.on('open', () => {
                currentCall = peer.call(PREFIX + pin, localStream);
                document.getElementById('lobbyStatus').innerText = "Transmisi Layar Aktif! Lihat TV Anda.";
            });

            localStream.getVideoTracks()[0].onended = () => { window.location.reload(); };
        } catch (err) {
            alert("Gagal share screen: " + err.message);
        }
    }

    // ================= FUNGSI 3: MODE VIDEO CALL WA (2-ARAH) =================
    async function startWhatsAppCall() {
        const pin = document.getElementById('roomPin').value.trim();
        if(!pin) return alert("Masukkan ID Kamar!");

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('callScreen').style.display = 'block';

        // Nyalakan kamera depan kita dulu
        await setupLocalMedia({ video: { facingMode: "user" }, audio: true });

        // Mulai Koneksi
        peer = new Peer(PREFIX + pin + "-userA"); // Coba jadi pemanggil dulu
        
        peer.on('open', () => {
            // Kita siap menerima telepon
            document.getElementById('callStatus').innerText = "Berdering... Menunggu lawan bicara.";
        });

        peer.on('call', (call) => {
            // Menerima panggilan dari lawan bicara
            currentCall = call;
            call.answer(localStream); // Berikan video kita
            document.getElementById('callStatus').innerText = "00:00 (Terkoneksi)";
            
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
            });
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // Berarti kamar sudah dibuat oleh lawan bicara, kita panggil dia
                peer = new Peer();
                peer.on('open', () => {
                    currentCall = peer.call(PREFIX + pin + "-userA", localStream);
                    document.getElementById('callStatus').innerText = "Menyambungkan...";
                    
                    currentCall.on('stream', (remoteStream) => {
                        document.getElementById('remoteVideo').srcObject = remoteStream;
                        document.getElementById('callStatus').innerText = "00:00 (Terkoneksi)";
                    });
                });
            }
        });
    }

    // ================= KONTROL MEDIA (WA STYLE) =================
    async function setupLocalMedia(constraints) {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('localVideo');
        video.srcObject = localStream;
        // Matikan efek cermin jika pakai kamera belakang atau share screen
        video.style.transform = (constraints.video.facingMode === "environment" || constraints.video === true) ? "scaleX(1)" : "scaleX(-1)";
    }

    function toggleMic() {
        isMicOn = !isMicOn;
        localStream.getAudioTracks()[0].enabled = isMicOn;
        document.getElementById('btnMic').classList.toggle('off', !isMicOn);
    }

    function toggleCam() {
        isCamOn = !isCamOn;
        localStream.getVideoTracks()[0].enabled = isCamOn;
        document.getElementById('btnCam').classList.toggle('off', !isCamOn);
        document.getElementById('pipContainer').style.display = isCamOn ? "block" : "none";
    }

    async function flipCamera() {
        facingMode = facingMode === "user" ? "environment" : "user";
        await setupLocalMedia({ video: { facingMode: facingMode }, audio: isMicOn });
        if(currentCall) {
            const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(localStream.getVideoTracks()[0]);
        }
    }

    async function shareScreenInCall() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            document.getElementById('localVideo').srcObject = screenStream;
            document.getElementById('localVideo').style.transform = "scaleX(1)"; // jangan cermin
            
            if(currentCall) {
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                sender.replaceTrack(screenStream.getVideoTracks()[0]);
            }

            screenStream.getVideoTracks()[0].onended = async () => {
                // Balik ke kamera depan kalau screen share dihentikan
                await setupLocalMedia({ video: { facingMode: facingMode }, audio: isMicOn });
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                sender.replaceTrack(localStream.getVideoTracks()[0]);
            };
        } catch(e) { console.error(e); }
    }

    function endCall() {
        if(currentCall) currentCall.close();
        if(peer) peer.destroy();
        window.location.reload();
    }
</script>

</body>
</html>
