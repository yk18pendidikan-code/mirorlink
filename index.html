<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Cast & MirrorLink Pro</title>
    <!-- PeerJS untuk koneksi real-time ultra low-latency -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #090d16;
            --card: #131a2c;
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f3f4f6;
            --muted: #6b7280;
            --border: #24324f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.6rem; text-align: center; margin-bottom: 5px; color: #fff; }
        .subtitle { font-size: 0.85rem; text-align: center; color: var(--muted); margin-bottom: 20px; }
        
        .setup-box {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--text); margin-bottom: 8px; font-weight: 500; }
        
        .pin-input {
            width: 100%;
            padding: 12px;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 6px;
            text-align: center;
            background: #090d16;
            border: 2px solid var(--border);
            color: #fff;
            border-radius: 10px;
        }
        .pin-input:focus { border-color: var(--primary); outline: none; }

        /* Media Control Switchers */
        .media-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .toggle-btn {
            background: #1e293b;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
        }
        .toggle-btn.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            color: #a5b4fc;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            color: #fff;
            transition: 0.2s;
        }
        .btn-green { background: var(--success); color: #090d16; }
        .btn-purple { background: var(--primary); }
        .btn-red { background: var(--danger); display: none; margin-top: 15px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .status-bar {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            background: #090d16;
            color: #a5b4fc;
            text-align: center;
            border: 1px solid var(--border);
        }

        .active-panel { display: none; text-align: center; margin-top: 15px; }
        .room-banner { font-size: 1.3rem; font-weight: bold; color: var(--success); background: rgba(16,185,129,0.1); padding: 10px; border-radius: 8px; }

        /* Video Output & AirPlay Layer */
        .video-container {
            margin-top: 20px;
            display: none;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
        }
        video {
            width: 100%;
            max-height: 55vh;
            display: block;
            object-fit: contain;
        }
        .cast-tip {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 6px;
            text-align: center;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Universal Cast Pro</h1>
    <p class="subtitle">Real-time Stream, Camera Flip & AirPlay Support</p>

    <!-- PANEL UTAMA SETUP -->
    <div id="setupSection">
        <div class="setup-box">
            <div class="form-group">
                <label for="roomPin">Buat / Masukkan PIN Kamar Bebas (4-6 Digit):</label>
                <input type="number" id="roomPin" class="pin-input" placeholder="1234">
            </div>

            <!-- Pengaturan Media Sebelum Transmisi -->
            <label>Konfigurasi Media Pengirim (HP):</label>
            <div class="media-controls">
                <button id="toggleCamera" class="toggle-btn active" onclick="switchCamera()">📷 Kamera: Belakang</button>
                <button id="toggleMic" class="toggle-btn" onclick="switchMic()">🎙️ Mic: MATI</button>
            </div>
        </div>

        <!-- Tombol Aksi -->
        <button class="btn btn-green" onclick="initReceiver()">📺 Jadikan Perangkat Ini PENERIMA (TV/PC)</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-purple" onclick="initSender('screen')">💻 Transmisi Layar</button>
            <button class="btn btn-purple" onclick="initSender('camera')">📸 Transmisi Kamera</button>
        </div>
    </div>

    <!-- PANEL AKTIF SAAT TERKONEKSI -->
    <div id="activeSection" class="active-panel">
        <div class="room-banner">Kamar Terhubung PIN: <span id="pinDisplay">0000</span></div>
    </div>

    <button id="btnDisconnect" class="btn btn-red" onclick="killConnection()">Putuskan & Reset Jaringan</button>

    <!-- Monitor Status Jaringan -->
    <div id="statusMessage" class="status-bar">Status: Menunggu Konfigurasi PIN...</div>

    <!-- Area Player Screen dengan Atribut Airplay -->
    <div class="video-container" id="videoArea">
        <!-- x-webkit-airplay, airplay, & pip disiapkan untuk memicu kontrol native iOS/Mac/Android -->
        <video id="viewscreen" autoplay playsinline controls 
               x-webkit-airplay="allow" 
               airplay="allow" 
               webkit-playsinline 
               picture-in-picture="allow">
        </video>
        <div class="cast-tip">
            💡 <strong>Tips AirPlay / Smart TV:</strong> Ketuk tombol bawaan player di atas untuk memproyeksikan video langsung ke TV pintar Anda secara native.
        </div>
    </div>
</div>

<script>
    let peer = null;
    let currentCall = null;
    let localStream = null;
    
    // Status awal konfigurasi media pengirim
    let cameraFacing = "environment"; // default kamera belakang
    let micEnabled = false; // default mikrofon mati

    const ID_PREFIX = "universal-mirrorlink-secure-room-";

    function updateStatus(txt) { document.getElementById('statusMessage').innerText = "Status: " + txt; }

    // Fitur Sakelar Kamera (Depan/Belakang)
    function switchCamera() {
        const btn = document.getElementById('toggleCamera');
        if (cameraFacing === "environment") {
            cameraFacing = "user";
            btn.innerText = "📷 Kamera: Depan";
        } else {
            cameraFacing = "environment";
            btn.innerText = "📷 Kamera: Belakang";
        }
    }

    // Fitur Sakelar Mikrofon (On/Off)
    function switchMic() {
        const btn = document.getElementById('toggleMic');
        micEnabled = !micEnabled;
        if (micEnabled) {
            btn.classList.add('active');
            btn.innerText = "🎙️ Mic: AKTIF";
        } else {
            btn.classList.remove('active');
            btn.innerText = "🎙️ Mic: MATI";
        }
    }

    // ================= 1. PROSEDUR SEBAGAI PENERIMA (TV / LAPTOP) =================
    function initReceiver() {
        const pin = document.getElementById('roomPin').value.trim();
        if(pin.length < 4) return alert("Harap masukkan PIN minimal 4 angka!");

        updateStatus("Membuka jalur transmisi di cloud...");
        peer = new Peer(ID_PREFIX + pin, {
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', () => {
            updateStatus("Menunggu Kiriman Sinyal Transmisi dari HP Anda...");
            applyUILayout(pin);
        });

        peer.on('call', (call) => {
            updateStatus("Sinyal diterima! Menstabilkan pemutaran video...");
            currentCall = call;
            call.answer(); // Terima tanpa lempar stream balik

            call.on('stream', (incomingStream) => {
                renderVideoStream(incomingStream);
                updateStatus("Koneksi Sukses! Layar Terproyeksi Real-time.");
            });
        });

        peer.on('error', handleErrorEvent);
    }

    // ================= 2. PROSEDUR SEBAGAI PENGIRIM (HP / SUMBER DATA) =================
    async function initSender(type) {
        const pin = document.getElementById('roomPin').value.trim();
        if(pin.length < 4) return alert("Harap masukkan PIN minimal 4 angka!");

        updateStatus("Meminta otorisasi perangkat...");
        try {
            // Membangun Constraints Media Dinamis sesuai pilihan user di UI
            let mediaConstraints = {
                audio: micEnabled,
                video: type === 'camera' ? { facingMode: cameraFacing, width: 1280, height: 720 } : true
            };

            if (type === 'screen') {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                    throw new Error("Sistem operasi HP memblokir rekam layar web penuh. Silakan gunakan opsi 'Transmisi Kamera' atau jalankan melalui Chrome PC.");
                }
                // Jika rekam layar diaktifkan, mik disatukan jika dipilih aktif
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: micEnabled });
            } else {
                // Mengambil jalur kamera (Depan / Belakang) + Kondisi Mikrofon
                localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
            }

            updateStatus("Mencari Kamar Penerima...");
            peer = new Peer({
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', () => {
                const targetId = ID_PREFIX + pin;
                currentCall = peer.call(targetId, localStream);

                // Tampilkan video lokal sebagai monitor di HP pengirim
                renderVideoStream(localStream);
                document.getElementById('viewscreen').muted = true; // bisukan lokal agar tidak gema balik

                applyUILayout(pin);
                updateStatus("Transmisi Aktif! Layar/Kamera sedang dikirim.");
            });

            peer.on('error', handleErrorEvent);

            // Jika user menekan tombol hentikan berbagi bawaan OS
            localStream.getVideoTracks()[0].onended = () => { killConnection(); };

        } catch (err) {
            console.error(err);
            updateStatus("Gagal Transmisi: " + err.message);
        }
    }

    // ================= 3. FUNGSI UTILITAS PENDUKUNG =================
    function renderVideoStream(stream) {
        const video = document.getElementById('viewscreen');
        document.getElementById('videoArea').style.display = 'block';
        video.srcObject = stream;
        video.play().catch(e => console.log("Autoplay dicegah browser, menanti interaksi user."));
    }

    function applyUILayout(pin) {
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('activeSection').style.display = 'block';
        document.getElementById('btnDisconnect').style.display = 'block';
        document.getElementById('pinDisplay').innerText = pin;
    }

    function handleErrorEvent(err) {
        if (err.type === 'peer-unavailable') {
            updateStatus("❌ GAGAL: Kamar tidak ditemukan! Pastikan TV/PC sudah klik tombol 'Jadikan PENERIMA' terlebih dahulu.");
        } else if (err.type === 'unavailable-id') {
            updateStatus("❌ GAGAL: PIN sudah dipakai pengguna lain di server cloud. Ganti dengan PIN lain.");
        } else {
            updateStatus("Gangguan Jaringan: " + err.message);
        }
    }

    function killConnection() {
        updateStatus("Jaringan dibersihkan. Menunggu instruksi...");
        if (currentCall) currentCall.close();
        if (peer) peer.destroy();
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }

        document.getElementById('viewscreen').srcObject = null;
        document.getElementById('videoArea').style.display = 'none';
        document.getElementById('activeSection').style.display = 'none';
        document.getElementById('btnDisconnect').style.display = 'none';
        document.getElementById('setupSection').style.display = 'block';
    }
</script>

</body>
</html>
